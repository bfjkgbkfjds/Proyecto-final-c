    <div class="container let">
        <h1 class="mt-5">Registro de Usuario</h1>
        <form id="registerForm">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre:</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>
            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido:</label>
                <input type="text" class="form-control" id="apellido" name="apellido" required>
            </div>
            <div class="mb-3">
                <label for="direccion" class="form-label">Dirección:</label>
                <input type="text" class="form-control" id="direccion" name="direccion" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña:</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirmar Contraseña:</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.getElementById("registerForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Evita que el formulario se envíe

            // Obtén los valores del formulario
            var nombre = document.getElementById("nombre").value;
            var apellido = document.getElementById("apellido").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            var confirm_password = document.getElementById("confirm_password").value;

            // Verifica si las contraseñas coinciden
            if (password !== confirm_password) {
                alert("Las contraseñas no coinciden.");
                return;
            }

            // Crea un objeto de usuario
            var user = {
                nombre: nombre,
                apellido: apellido,
                email: email,
                password: password
            };

            // Guarda el objeto de usuario en localStorage
            localStorage.setItem("user", JSON.stringify(user));

            // Muestra el nombre del usuario
            document.getElementById("usernameDisplay").innerText = "Bienvenido/a, " + nombre;

            // Redirige a la página de confirmación de inicio de sesión
            window.location.href = "login.html";
        });

        // Muestra el nombre de usuario si está logeado
        window.addEventListener("load", function() {
            var user = JSON.parse(localStorage.getItem("user"));
            if (user) {
                document.getElementById("usernameDisplay").innerText = "Bienvenido/a, " + user.nombre;
            }
        });
    </script>
